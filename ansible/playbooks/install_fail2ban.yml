---
- name: Security Hardening - Install and Configure Fail2Ban
  hosts: all
  become: true

  tasks:
    - name: Install Fail2Ban package
      ansible.builtin.package:
        name: fail2ban
        state: present

    - name: Ensure custom SSH jail configuration is active
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
          bantime = 3600
        owner: root
        group: root
        mode: '0644'
      notify: Restart Fail2Ban service

    - name: Ensure Fail2Ban service is started and enabled
      ansible.builtin.service:
        name: fail2ban
        state: started
        enabled: true

  handlers:
    - name: Restart Fail2Ban service
      ansible.builtin.service:
        name: fail2ban
        state: restarted